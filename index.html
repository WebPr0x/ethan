<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f9fafb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="app" class="w-full max-w-md p-8 mx-4 transition-all duration-500 ease-in-out glass-card rounded-2xl shadow-xl">
        
        <!-- Login State -->
        <div id="login-container" class="space-y-6">
            <div class="text-center">
                <h1 class="text-2xl font-bold text-gray-800">Protected Content</h1>
                <p class="text-sm text-gray-500 mt-2">Please enter your password to continue</p>
            </div>

            <div class="space-y-4">
                <div>
                    <input 
                        type="password" 
                        id="password-input" 
                        placeholder="Enter password" 
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                    >
                </div>
                <button 
                    onclick="checkPassword()" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-colors duration-200"
                >
                    Unlock
                </button>
                <p id="error-message" class="text-red-500 text-sm text-center hidden">Incorrect password. Please try again.</p>
            </div>
        </div>

        <!-- Success State (Hidden by default) -->
        <div id="success-container" class="hidden space-y-6 text-center animate-in fade-in zoom-in duration-500">
            <div class="flex justify-center">
                <div class="bg-green-100 p-3 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-green-600" fill="none" viewbox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">Access Granted</h2>
            <div class="p-4 bg-gray-50 rounded-lg border border-gray-200">
                <p class="text-lg text-gray-700">Go to <a href="https://bit.ly/4cVditq" target="_blank" class="text-blue-600 underline font-medium">https://bit.ly/4cVditq</a></p>
            </div>
        </div>
    </div>

    <script>
        function checkPassword() {
            const input = document.getElementById('password-input').value;
            const loginContainer = document.getElementById('login-container');
            const successContainer = document.getElementById('success-container');
            const errorMessage = document.getElementById('error-message');

            if (input === "gd") {
                // Transition UI
                loginContainer.classList.add('hidden');
                successContainer.classList.remove('hidden');
            } else {
                // Show error
                errorMessage.classList.remove('hidden');
                // Shake effect
                const app = document.getElementById('app');
                app.classList.add('animate-bounce');
                setTimeout(() => app.classList.remove('animate-bounce'), 500);
            }
        }

        // Allow pressing "Enter" to submit
        document.getElementById('password-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });
    </script>
</body>
</html>
